interface:
  display_name: "Doc Driven Dev"
  short_description: "以文档驱动开发：用 project 维护项目级规则、介绍、目标与设计，用 task 推进实施，用 finding 记录并行发现项"
  default_prompt: "按 Doc Driven Dev 的约定推进工作：用 `doc/project.md` 维护项目级全局规则、项目介绍、目标、路线与设计，用 `doc/tasks.md` 管理任务索引，用 `doc/task-编号-概述.md` 作为最小实施单元；如存在并行发现，按 `doc/findings.md` 记录评审结论。"
